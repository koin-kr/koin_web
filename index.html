<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOIN — Point & Discover Korea</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: #fff; }
.phone { width: 100%; height: 100dvh; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; position: relative; background: #fff; }

.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0; z-index: 10; }
.logo-wrap { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 34px; height: 34px; border-radius: 9px; overflow: hidden; flex-shrink: 0; }
.logo-icon img { width: 100%; height: 100%; object-fit: cover; }
.logo-text img { height: 22px; width: auto; }
.store-btns { display: flex; gap: 6px; align-items: center; }
.store-btn { display: flex; align-items: center; gap: 5px; background: #EBF4FE; color: #1a6bbf; border: 1px solid #c8e0f8; border-radius: 8px; padding: 5px 10px; text-decoration: none; }
.store-btn img { width: 16px; height: 16px; object-fit: contain; border-radius: 3px; }
.store-btn-text { display: flex; flex-direction: column; line-height: 1.1; }
.store-btn-sub { font-size: 8px; color: #5a9fd4; }
.store-btn-name { font-size: 11px; font-weight: 600; color: #1a6bbf; }

.camera-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.camera-area { flex: 1; position: relative; background: #f5f7fa; display: flex; align-items: center; justify-content: flex-start; flex-direction: column; overflow: hidden; }
#videoEl { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
#canvasEl { display: none; }
/* ── Language selection screen ── */
/* ── Inline language picker ── */
.lang-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; padding-bottom: 4px; }
.lang-bar-wrap .lang-bar-label { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 0.8px; text-transform: uppercase; }
.lang-bar { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: nowrap; width: 100%; }
.lang-btn-pill { display: flex; align-items: center; justify-content: center; background: #fff; border: 2px solid #dce6fb; border-radius: 8px; padding: 5px 7px; cursor: pointer; transition: all 0.15s; }
.lang-btn-pill:hover { border-color: #3D8FE0; color: #1a2340; }
.lang-btn-pill.active { border-color: #3D8FE0; box-shadow: 0 0 0 2px #3D8FE0; }
.lang-btn-pill .flag-img { width: 36px; height: 26px; border-radius: 4px; object-fit: cover; display: block; }

/* ── Camera placeholder ── */
.placeholder { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 2; text-align: center; padding: 20px 24px; width: 100%; }
.placeholder-icon { display: none; }
.placeholder-hint { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
.hint-section-title { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.6px; text-transform: uppercase; text-align: center; width: 100%; margin-bottom: 0; margin-top: 20px; }
.hint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
.hint-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: #f0f4ff; border-radius: 14px; padding: 14px 10px; text-align: center; }
.hint-card .hint-icon { font-size: 26px; line-height: 1; }
.hint-card .hint-text { font-size: 12px; font-weight: 600; color: #2a3a6e; line-height: 1.3; }
.start-btn { margin-top: 4px; padding: 14px 36px; background: #3D8FE0; color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; box-shadow: 0 4px 14px rgba(61,143,224,0.35); }
.lang-change-btn { display: none; }

.scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 200px; height: 200px; z-index: 3; pointer-events: none; display: none; }
.scan-overlay.active { display: block; }
.corner { position: absolute; width: 24px; height: 24px; border-color: rgba(255,255,255,0.85); border-style: solid; border-width: 0; }
.corner.tl { top:0;left:0;border-top-width:2px;border-left-width:2px;border-radius:4px 0 0 0; }
.corner.tr { top:0;right:0;border-top-width:2px;border-right-width:2px;border-radius:0 4px 0 0; }
.corner.bl { bottom:0;left:0;border-bottom-width:2px;border-left-width:2px;border-radius:0 0 0 4px; }
.corner.br { bottom:0;right:0;border-bottom-width:2px;border-right-width:2px;border-radius:0 0 4px 0; }
.scan-line { position: absolute; left:8px; right:8px; height:1.5px; background: linear-gradient(90deg,transparent,rgba(61,143,224,0.9),transparent); animation: scan 2s ease-in-out infinite; top:8px; }
@keyframes scan { 0%{top:8px;opacity:1} 100%{top:184px;opacity:0.2} }

.loading-overlay { position: absolute; inset:0; background: rgba(0,0,0,0.5); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 20; }
.loading-overlay.active { display: flex; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size:13px; color:rgba(255,255,255,0.8); }

.controls { padding: 16px 32px 24px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-top: 1px solid #eee; flex-shrink: 0; }
.btn-gallery { width: 52px; height: 52px; border-radius: 14px; background: #f0f2f5; border: 1.5px solid #e0e3e8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-gallery svg { width: 24px; height: 24px; stroke: #555; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.btn-shutter { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 3px solid #3D8FE0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; }
.btn-shutter:active { transform: scale(0.94); }
.btn-shutter-inner { width: 56px; height: 56px; border-radius: 50%; background: #3D8FE0; }
.btn-flip { width: 52px; height: 52px; border-radius: 14px; background: #f0f2f5; border: 1.5px solid #e0e3e8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-flip svg { width: 24px; height: 24px; stroke: #555; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.error-msg { font-size:12px; color:#c0392b; text-align:center; padding:6px 16px; background:#fff; display:none; flex-shrink:0; }

.result-screen { display:none; flex-direction:column; position:absolute; inset:0; z-index:30; background:#f5f7fa; }
.result-screen.visible { display:flex; }
.result-bg { display:none; }
.result-inner { position:relative; z-index:2; display:flex; flex-direction:column; height:100%; padding:14px 14px 0; justify-content:flex-start; overflow-y:auto; }

.result-card { background:rgba(255,255,255,0.97); border-radius:20px; padding:22px 20px 16px; margin-bottom:10px; overflow:visible; }
.result-card-title { font-size:18px; font-weight:700; color:#1a1a1a; margin-bottom:10px; line-height:1.3; }
.result-card-body { font-size:14px; color:#333; line-height:1.7; margin-bottom:14px; white-space:pre-wrap; }
.helpful-row { display:flex; align-items:center; justify-content:center; gap:12px; padding-top:12px; border-top:1px solid #f0f0f0; }
.helpful-label { font-size:12px; color:#999; }
.thumb-btn { width:44px; height:44px; border-radius:50%; border:1.5px solid #e0e0e0; background:rgba(255,255,255,0.9); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:all 0.15s; }
.thumb-btn.active { background:#EBF4FE; border-color:#3D8FE0; }

.full-download-btn { display:block; width:100%; padding:15px; background:#3D8FE0; color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; text-decoration:none; text-align:center; margin-bottom:10px; box-shadow:0 4px 14px rgba(61,143,224,0.4); }

.download-row { display:flex; gap:10px; margin-bottom:24px; }
.download-store-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:10px; background:#EBF4FE; color:#1a6bbf; border:1.5px solid #c8e0f8; border-radius:14px; padding:12px 10px; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; }
.download-store-btn img { width:30px; height:30px; object-fit:contain; }
.download-store-btn-text { display:flex; flex-direction:column; line-height:1.2; }
.download-store-btn-sub { font-size:9px; color:#5a9fd4; }
.download-store-btn-name { font-size:13px; font-weight:600; color:#1a6bbf; }

#fileInput { display:none; }
</style>
</head>

    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-btn-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderHints(currentLang);
  });
});

// ── One-use lock ──────────────────────────────────────────────────────────────
function isUsed() { return sessionStorage.getItem(USED_KEY) === '1'; }
function markUsed() { sessionStorage.setItem(USED_KEY, '1'); }

function showUsedScreen() {
  const cfg = LANG_CONFIG[currentLang];
  document.getElementById('resultTitle').textContent = cfg.usedTitle;
  document.getElementById('resultBody').textContent = cfg.usedBody;
  const dlBtn = document.querySelector('.full-download-btn');
  if (dlBtn) dlBtn.textContent = cfg.usedBtn;
  resultScreen.classList.add('visible');
  disableControls();
}

function disableControls() {
  document.getElementById('shutterBtn').disabled = true;
  document.getElementById('shutterBtn').style.opacity = '0.35';
  document.getElementById('flipBtn').disabled = true;
  document.getElementById('flipBtn').style.opacity = '0.35';
  const galleryLabel = document.querySelector('.btn-gallery');
  if (galleryLabel) { galleryLabel.style.opacity = '0.35'; galleryLabel.style.pointerEvents = 'none'; }
  document.getElementById('fileInput').disabled = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').style.opacity = '0.35';
}

window.addEventListener('DOMContentLoaded', () => {
  renderHints('en');
  if (isUsed()) { showUsedScreen(); }
});

document.getElementById('startBtn').addEventListener('click', startCamera);
document.getElementById('shutterBtn').addEventListener('click', capture);
document.getElementById('flipBtn').addEventListener('click', flipCamera);
document.getElementById('fileInput').addEventListener('change', handleFile);
document.getElementById('thumbUp').addEventListener('click', function(){ this.classList.toggle('active'); document.getElementById('thumbDown').classList.remove('active'); });
document.getElementById('thumbDown').addEventListener('click', function(){ this.classList.toggle('active'); document.getElementById('thumbUp').classList.remove('active'); });

async function startCamera() {
  if (isUsed()) { showUsedScreen(); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: false });
    video.srcObject = stream;
    placeholder.style.display = 'none';
    scanOverlay.classList.add('active');
    errorMsg.style.display = 'none';
  } catch(e) { showError(LANG_CONFIG[currentLang].error); }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (stream) { stream.getTracks().forEach(t => t.stop()); await startCamera(); }
}

async function capture() {
  if (isUsed()) { showUsedScreen(); return; }
  if (!stream) { showError(LANG_CONFIG[currentLang].errorCapture); return; }
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  resultBg.style.backgroundImage = `url(${dataUrl})`;
  await analyze(dataUrl.split(',')[1]);
}

async function handleFile(e) {
  if (isUsed()) { showUsedScreen(); return; }
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    resultBg.style.backgroundImage = `url(${ev.target.result})`;
    await analyze(ev.target.result.split(',')[1]);
  };
  reader.readAsDataURL(file);
}

async function analyze(base64) {
  const PROMPT = LANG_CONFIG[currentLang].prompt;
  scanOverlay.classList.remove('active');
  loadingOverlay.classList.add('active');
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT }, { inline_data: { mime_type: 'image/jpeg', data: base64 } }] }] })
    });
    const data = await res.json();
    const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch(e) { parsed = { title: "Here's what I found", body: raw }; }
    document.getElementById('resultTitle').textContent = parsed.title || '';
    document.getElementById('resultBody').textContent = parsed.body || '';
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    markUsed();
    disableControls();
    resultScreen.classList.add('visible');
  } catch(e) { showError(LANG_CONFIG[currentLang].errorNetwork); scanOverlay.classList.add('active'); }
  finally { loadingOverlay.classList.remove('active'); }
}

function showError(msg) {
  errorMsg.textContent = msg; errorMsg.style.display = 'block';
  setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
}
</script>
