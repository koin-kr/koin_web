<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOIN — Point & Discover Korea</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: #f5f7fa; }
.phone { width: 100%; height: 100dvh; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; background: #f5f7fa; }

/* TOP BAR */
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0; }
.logo-wrap { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 34px; height: 34px; border-radius: 9px; overflow: hidden; flex-shrink: 0; }
.logo-icon img { width: 100%; height: 100%; object-fit: cover; }
.logo-text img { height: 22px; width: auto; }
.store-btns { display: flex; gap: 6px; align-items: center; }
.store-btn { display: flex; align-items: center; gap: 5px; background: #111; color: #fff; border-radius: 8px; padding: 5px 10px; text-decoration: none; border: none; cursor: pointer; }
.store-btn svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }
.store-btn-text { display: flex; flex-direction: column; line-height: 1.1; }
.store-btn-sub { font-size: 8px; opacity: 0.8; }
.store-btn-name { font-size: 11px; font-weight: 600; }

/* CAMERA SCREEN */
.camera-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.camera-area { flex: 1; position: relative; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#videoEl { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
#canvasEl { display: none; }
.placeholder { display: flex; flex-direction: column; align-items: center; gap: 14px; color: rgba(255,255,255,0.65); z-index: 2; text-align: center; padding: 24px; }
.placeholder-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 32px; }
.placeholder p { font-size: 14px; line-height: 1.6; }
.start-btn { margin-top: 4px; padding: 13px 32px; background: #3D8FE0; color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; letter-spacing: -0.2px; }

/* SCAN OVERLAY */
.scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 200px; height: 200px; z-index: 3; pointer-events: none; display: none; }
.scan-overlay.active { display: block; }
.corner { position: absolute; width: 24px; height: 24px; border-color: rgba(255,255,255,0.85); border-style: solid; border-width: 0; }
.corner.tl { top:0;left:0;border-top-width:2px;border-left-width:2px;border-radius:4px 0 0 0; }
.corner.tr { top:0;right:0;border-top-width:2px;border-right-width:2px;border-radius:0 4px 0 0; }
.corner.bl { bottom:0;left:0;border-bottom-width:2px;border-left-width:2px;border-radius:0 0 0 4px; }
.corner.br { bottom:0;right:0;border-bottom-width:2px;border-right-width:2px;border-radius:0 0 4px 0; }
.scan-line { position: absolute; left:8px; right:8px; height:1.5px; background: linear-gradient(90deg,transparent,rgba(61,143,224,0.9),transparent); animation: scan 2s ease-in-out infinite; top:8px; }
@keyframes scan { 0%{top:8px;opacity:1} 100%{top:184px;opacity:0.2} }

/* LOADING */
.loading-overlay { position: absolute; inset:0; background: rgba(10,10,10,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 20; }
.loading-overlay.active { display: flex; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.2); border-top-color:#3D8FE0; border-radius:50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size:13px; color:rgba(255,255,255,0.7); }

/* CONTROLS */
.controls { padding: 16px 32px 24px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-top: 1px solid #eee; flex-shrink: 0; }
.btn-gallery { width: 52px; height: 52px; border-radius: 14px; background: #f0f2f5; border: 1.5px solid #e0e3e8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-gallery svg { width: 24px; height: 24px; stroke: #555; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.btn-shutter { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 3px solid #3D8FE0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; position: relative; }
.btn-shutter:active { transform: scale(0.94); }
.btn-shutter-inner { width: 56px; height: 56px; border-radius: 50%; background: #3D8FE0; }
.btn-flip { width: 52px; height: 52px; border-radius: 14px; background: #f0f2f5; border: 1.5px solid #e0e3e8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-flip svg { width: 24px; height: 24px; stroke: #555; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.error-msg { font-size:12px; color:#c0392b; text-align:center; padding:6px 16px; background:#fff; display:none; flex-shrink:0; }

/* RESULT SCREEN */
.result-screen { display:none; flex-direction:column; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.result-screen.visible { display:flex; }
.result-img-preview { width:100%; height:210px; object-fit:cover; flex-shrink:0; }
.result-card { margin:14px 14px 10px; background:#fff; border-radius:16px; padding:18px; border:1px solid #eee; }
.result-emoji { font-size:26px; margin-bottom:8px; display:block; }
.result-title { font-size:17px; font-weight:600; color:#1a1a1a; margin-bottom:8px; line-height:1.4; }
.result-body { font-size:14px; color:#555; line-height:1.7; margin-bottom:14px; }
.helpful-row { display:flex; align-items:center; gap:10px; padding-top:12px; border-top:1px solid #f0f0f0; }
.helpful-label { font-size:12px; color:#999; flex:1; }
.thumb-btn { width:36px; height:36px; border-radius:50%; border:1px solid #e0e0e0; background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; transition:background 0.15s; }
.thumb-btn.active { background:#EBF4FE; border-color:#3D8FE0; }
.used-notice { margin:0 14px 10px; background:#FFF8EC; border:1px solid #FFE0A0; border-radius:12px; padding:14px 16px; display:flex; align-items:flex-start; gap:10px; }
.used-notice-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.used-notice-text { font-size:13px; color:#7A5500; line-height:1.5; }
.used-notice-text strong { color:#5A3A00; font-weight:600; }
.download-row { display:flex; gap:10px; margin:0 14px 8px; }
.download-store-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; background:#111; color:#fff; border:none; border-radius:14px; padding:13px 10px; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; }
.download-store-btn svg { width:20px; height:20px; fill:#fff; flex-shrink:0; }
.download-store-btn-text { display:flex; flex-direction:column; line-height:1.2; }
.download-store-btn-sub { font-size:9px; opacity:0.75; }
.download-store-btn-name { font-size:13px; font-weight:600; }
.retry-link { text-align:center; padding:10px 14px 24px; font-size:13px; color:#3D8FE0; cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; width:100%; }
#fileInput { display:none; }
</style>
</head>

      <a class="download-store-btn" href="https://apps.apple.com/app/koin" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <div class="download-store-btn-text">
          <span class="download-store-btn-sub">Download on the</span>
          <span class="download-store-btn-name">App Store</span>
        </div>
      </a>
      <a class="download-store-btn" href="https://play.google.com/store/apps/details?id=com.koin" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M3.18 23.76c.3.17.65.19.97.08l.1-.06 11.05-6.37-2.39-2.39-9.73 8.74zM.5 1.6C.19 1.93 0 2.43 0 3.07v17.86c0 .64.19 1.14.51 1.47l.08.07 10-10v-.24L.58 1.53.5 1.6zM20.65 10.23l-2.79-1.61-2.68 2.68 2.68 2.68 2.81-1.62c.8-.46.8-1.21-.02-1.73zM4.15.24L15.2 6.61l-2.39 2.39L3.08.26 3.18.2C3.5.08 3.85.11 4.15.24z"/></svg>
        <div class="download-store-btn-text">
          <span class="download-store-btn-sub">Get it on</span>
          <span class="download-store-btn-name">Google Play</span>
        </div>
      </a>
    </div>
    <button class="retry-link" id="retryBtn">← Scan another</button>
  </div>

  <input type="file" id="fileInput" accept="image/*">
</div>

<script>
const PROXY_URL = 'https://koin-gemini-proxy.YOURWORKERNAME.workers.dev';
const PROMPT = `You are a helpful guide for foreign tourists visiting Korea. Analyze this image and respond in this exact JSON format (no markdown, no backticks):
{"emoji":"<one relevant emoji>","title":"<short title: translation or place name, max 10 words>","body":"<2-4 sentences: translation of any Korean text, what this is, and useful travel context>"}`;

let stream = null, facingMode = 'environment';
const video = document.getElementById('videoEl');
const canvas = document.getElementById('canvasEl');
const placeholder = document.getElementById('placeholder');
const scanOverlay = document.getElementById('scanOverlay');
const loadingOverlay = document.getElementById('loadingOverlay');
const cameraScreen = document.getElementById('cameraScreen');
const resultScreen = document.getElementById('resultScreen');
const errorMsg = document.getElementById('errorMsg');

document.getElementById('startBtn').addEventListener('click', startCamera);
document.getElementById('shutterBtn').addEventListener('click', capture);
document.getElementById('flipBtn').addEventListener('click', flipCamera);
document.getElementById('retryBtn').addEventListener('click', retry);
document.getElementById('fileInput').addEventListener('change', handleFile);
document.getElementById('thumbUp').addEventListener('click', function(){ this.classList.toggle('active'); document.getElementById('thumbDown').classList.remove('active'); });
document.getElementById('thumbDown').addEventListener('click', function(){ this.classList.toggle('active'); document.getElementById('thumbUp').classList.remove('active'); });

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: false });
    video.srcObject = stream;
    placeholder.style.display = 'none';
    scanOverlay.classList.add('active');
    errorMsg.style.display = 'none';
  } catch(e) { showError('Camera access denied. Use the gallery button to upload a photo.'); }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (stream) { stream.getTracks().forEach(t => t.stop()); await startCamera(); }
}

function retry() {
  resultScreen.classList.remove('visible');
  cameraScreen.style.display = 'flex';
  scanOverlay.classList.add('active');
  document.getElementById('thumbUp').classList.remove('active');
  document.getElementById('thumbDown').classList.remove('active');
}

async function capture() {
  if (!stream) { showError('Tap "Start camera" first.'); return; }
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  document.getElementById('resultImg').src = dataUrl;
  await analyze(dataUrl.split(',')[1]);
}

async function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => { document.getElementById('resultImg').src = ev.target.result; await analyze(ev.target.result.split(',')[1]); };
  reader.readAsDataURL(file);
}

async function analyze(base64) {
  scanOverlay.classList.remove('active');
  loadingOverlay.classList.add('active');
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT }, { inline_data: { mime_type: 'image/jpeg', data: base64 } }] }] })
    });
    const data = await res.json();
    const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch(e) { parsed = { emoji: '📍', title: "Here's what I found", body: raw }; }
    document.getElementById('resultEmoji').textContent = parsed.emoji || '📍';
    document.getElementById('resultTitle').textContent = parsed.title || '';
    document.getElementById('resultBody').textContent = parsed.body || '';
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    cameraScreen.style.display = 'none';
    resultScreen.classList.add('visible');
  } catch(e) { showError('Network error. Please try again.'); scanOverlay.classList.add('active'); }
  finally { loadingOverlay.classList.remove('active'); }
}

function showError(msg) {
  errorMsg.textContent = msg; errorMsg.style.display = 'block';
  setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
